# Render Blueprint for FlowCommerce AI backend.
# 4 web services + 3 background workers. Backing services (Neon, Upstash,
# Confluent) are external — set their connection vars per service below.
#
# Secrets are intentionally left blank (sync: false) so they are entered in the
# Render dashboard, never committed. See .env.production.example for values.

services:
  # ── Web services ────────────────────────────────────────────────────────
  - type: web
    name: flowcommerce-auth
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn auth_service.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: POSTGRES_DSN
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false

  - type: web
    name: flowcommerce-catalog
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn catalog_service.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: POSTGRES_DSN
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false

  - type: web
    name: flowcommerce-order
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn order_service.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: POSTGRES_DSN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: KAFKA_BOOTSTRAP
        sync: false
      - key: KAFKA_SECURITY_PROTOCOL
        value: SASL_SSL
      - key: KAFKA_SASL_MECHANISM
        value: PLAIN
      - key: KAFKA_USERNAME
        sync: false
      - key: KAFKA_PASSWORD
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: AUTH_SERVICE_URL
        sync: false
      - key: CATALOG_SERVICE_URL
        sync: false
      - key: ORDER_SERVICE_URL
        sync: false
      - key: INVENTORY_SERVICE_URL
        sync: false
      - key: PAYMENT_SERVICE_URL
        sync: false
      - key: NOTIFICATION_SERVICE_URL
        sync: false
      - key: STRIPE_WEBHOOK_SERVICE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: flowcommerce-webhook
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn stripe_webhook_service.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: FRONTEND_ORIGIN
        sync: false
      - key: KAFKA_BOOTSTRAP
        sync: false
      - key: KAFKA_SECURITY_PROTOCOL
        value: SASL_SSL
      - key: KAFKA_SASL_MECHANISM
        value: PLAIN
      - key: KAFKA_USERNAME
        sync: false
      - key: KAFKA_PASSWORD
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  # ── Background workers (no port / no health check) ───────────────────────
  - type: worker
    name: flowcommerce-inventory
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m inventory_service.main
    envVars:
      - key: POSTGRES_DSN
        sync: false
      - key: KAFKA_BOOTSTRAP
        sync: false
      - key: KAFKA_SECURITY_PROTOCOL
        value: SASL_SSL
      - key: KAFKA_SASL_MECHANISM
        value: PLAIN
      - key: KAFKA_USERNAME
        sync: false
      - key: KAFKA_PASSWORD
        sync: false

  - type: worker
    name: flowcommerce-payment
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m payment_service.main
    envVars:
      - key: POSTGRES_DSN
        sync: false
      - key: KAFKA_BOOTSTRAP
        sync: false
      - key: KAFKA_SECURITY_PROTOCOL
        value: SASL_SSL
      - key: KAFKA_SASL_MECHANISM
        value: PLAIN
      - key: KAFKA_USERNAME
        sync: false
      - key: KAFKA_PASSWORD
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: PAYMENT_FAILURE_RATE
        value: "0.0"

  - type: worker
    name: flowcommerce-notification
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m notification_service.main
    envVars:
      - key: KAFKA_BOOTSTRAP
        sync: false
      - key: KAFKA_SECURITY_PROTOCOL
        value: SASL_SSL
      - key: KAFKA_SASL_MECHANISM
        value: PLAIN
      - key: KAFKA_USERNAME
        sync: false
      - key: KAFKA_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
